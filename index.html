<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Džigi2 | Restoran vrhunske gastronomije | Gradačac</title>
    <meta name="description" content="Doživite vrhunski spoj tradicije i luksuza u srcu Gradačca. Restoran Džigi2 – vaša destinacija za nezaboravne ukuse.">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c5a059;
            --dark: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; font-size: 16px; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: #fff; line-height: 1.6; }

        /* --- NAVIGATION --- */
        header { position: fixed; top: 0; width: 100%; padding: 25px 8%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(10,10,10,0.8); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(197, 160, 89, 0.2); }
        .logo { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--gold); letter-spacing: 2px; }
        
        .hamburger { cursor: pointer; display: flex; flex-direction: column; gap: 5px; }
        .hamburger span { width: 30px; height: 2px; background: #fff; transition: var(--transition); }
        .hamburger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        nav { position: fixed; inset: 0; background: var(--dark); display: flex; flex-direction: column; align-items: center; justify-content: center; transform: translateX(100%); transition: var(--transition); z-index: 900; }
        nav.active { transform: translateX(0); }
        nav a { font-family: 'Playfair Display'; font-size: 2.5rem; text-decoration: none; color: #fff; margin: 20px; transition: var(--transition); }
        nav a:hover { color: var(--gold); transform: scale(1.1); }

        /* --- HERO SECTION --- */
        .hero { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('dzigi2.jpg') center/cover fixed; padding: 0 20px; }
        .hero h1 { font-family: 'Playfair Display'; font-size: clamp(3rem, 10vw, 6rem); color: var(--gold); line-height: 1.1; }
        .hero p { font-size: 1.2rem; margin: 20px 0; letter-spacing: 3px; text-transform: uppercase; }
        
        .btn { padding: 18px 40px; border: 1px solid var(--gold); color: #fff; text-decoration: none; font-weight: 600; display: inline-block; margin-top: 20px; transition: var(--transition); }
        .btn:hover { background: var(--gold); color: #000; }

        /* --- UTILITIES --- */
        section { padding: 100px 8%; max-width: 1400px; margin: auto; }
        h2 { font-family: 'Playfair Display'; font-size: 3rem; color: var(--gold); text-align: center; margin-bottom: 60px; }

        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: var(--glass); border: 1px solid #222; overflow: hidden; border-radius: 10px; }
        .card img { width: 100%; height: 350px; object-fit: cover; transition: var(--transition); }
        .card:hover img { transform: scale(1.05); }

        .footer { padding: 50px; text-align: center; border-top: 1px solid #222; }

        /* Mobile specific */
        @media (max-width: 768px) { nav a { font-size: 1.8rem; } }
    </style>
</head>
<body>

<header>
    <div class="logo">DŽIGI2</div>
    <div class="hamburger" id="navToggle">
        <span></span><span></span><span></span>
    </div>
</header>

<nav id="navMenu">
    <a href="index.html">Početna</a>
    <a href="menijela.html">Meni jela</a>
    <a href="rezervacije.html">Rezervacije</a>
    <a href="galerija.html">Galerija</a>
</nav>

<section class="hero">
    <h1>Džigi2</h1>
    <p>Autentični ukusi | Gradačac</p>
    <a href="#rezervacija" class="btn">REZERVIŠI SADA</a>
</section>

<section>
    <h2>Naš Ambijent</h2>
    <div class="gallery">
        <div class="card"><img src="ambijent1.jpg" alt="Ambijent"></div>
        <div class="card"><img src="ambijent2.jpg" alt="Ambijent"></div>
        <div class="card"><img src="ambijent3.jpg" alt="Ambijent"></div>
    </div>
</section>

<footer class="footer">
    <p>&copy; 2026 Restoran Džigi2. Sva prava zadržana.</p>
</footer>

<script>
    const navToggle = document.getElementById('navToggle');
    const navMenu = document.getElementById('navMenu');

    navToggle.onclick = () => {
        navToggle.classList.toggle('active');
        navMenu.classList.toggle('active');
    };
</script>

</body>
</html>
