<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restoran Džigi2 | Gradačac</title>

<meta name="description" content="Džigi2 – luksuzni restoran u Gradačcu. Rezervacije, navigacija i kontakt.">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c6a55c;
  --gold-soft:#e7c97f;
  --dark:#0f0a07;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
  font-family:'Poppins',sans-serif;
  background:#0f0a07;
  color:#fff;
}

/* HERO */
.hero{
  position:relative;
  height:100vh;
  background:url('dzigi2.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,0.6),rgba(0,0,0,0.85));
}

.hero-content{
  position:relative;
  z-index:2;
  animation:fadeIn 1.5s ease;
}

.hero h2{
  font-size:64px;
  font-family:'Playfair Display',serif;
  background:linear-gradient(45deg,var(--gold),var(--gold-soft));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  margin-top:10px;
  font-size:22px;
  opacity:.9;
}

.status{
  margin-top:15px;
  font-weight:bold;
}

/* CTA */
.cta-main{
  display:inline-block;
  margin-top:30px;
  padding:16px 40px;
  border:2px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
  letter-spacing:2px;
  transition:.3s;
}
.cta-main:hover{
  background:var(--gold);
  color:#000;
  box-shadow:0 0 20px rgba(198,165,92,0.6);
}

.cta-row{
  margin-top:20px;
}
.cta-secondary{
  display:inline-block;
  margin:10px;
  padding:12px 25px;
  border:1px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
}

/* SECTION */
section{padding:80px 20px;text-align:center;}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}
.gallery img{
  width:100%;
  border-radius:12px;
}

/* REVIEWS */
.reviews{
  max-width:700px;
  margin:auto;
  font-style:italic;
}

/* MAP */
.map{width:100%;height:400px;margin-top:40px;}

/* STICKY MOBILE BAR */
.bottom-bar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  display:flex;
  justify-content:space-around;
  padding:10px;
}
.bottom-bar a{
  color:#fff;
  text-decoration:none;
}

/* WHATSAPP FLOAT */
.whatsapp{
  position:fixed;
  bottom:70px;
  right:20px;
  background:#25D366;
  width:55px;height:55px;
  border-radius:50%;
  text-align:center;
  line-height:55px;
  font-size:26px;
  color:#fff;
  text-decoration:none;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;}
}
</style>
</head>

<body>

<section class="hero">
  <div class="hero-content">
    <h2>Džigi2</h2>
    <p class="subtitle">Luksuz & Tradicija</p>
    <div id="status" class="status"></div>

    <a href="#" class="cta-main">REZERVIŠI STO</a>

    <div class="cta-row">
      <a href="tel:+38735818817" class="cta-secondary">📞 Pozovi</a>
      <a href="https://wa.me/38761015241" class="cta-secondary">💬 WhatsApp</a>
    </div>
  </div>
</section>

<section>
  <h2>Ambijent</h2>
  <div class="gallery">
    <img src="ambijent1.jpg">
    <img src="ambijent2.jpg">
    <img src="ambijent3.jpg">
    <img src="ambijent4.jpg">
  </div>
</section>

<section>
  <h2>Utisci gostiju</h2>
  <div class="reviews" id="reviews">
    “Najbolji restoran u gradu.”
  </div>
</section>

<section>
  <h2>Lokacija</h2>
  <div class="map">
    <iframe src="https://www.google.com/maps?q=44.8818319,18.4202649&z=18&output=embed"
    width="100%" height="100%" style="border:0;"></iframe>
  </div>
</section>

<footer style="text-align:center;padding:20px;background:#000;">
© 2026 Džigi2
</footer>

<a href="https://wa.me/38761015241" class="whatsapp">💬</a>

<div class="bottom-bar">
  <a href="tel:+38735818817">📞</a>
  <a href="https://wa.me/38761015241">💬</a>
  <a href="https://www.google.com/maps?q=44.8818319,18.4202649">📍</a>
</div>

<script>
// STATUS
const h=new Date().getHours();
document.getElementById('status').innerText=
(h>=8 && h<23)?"🟢 Otvoreni smo":"🔴 Zatvoreno";

// REVIEWS SLIDER
const reviews=[
"Najbolji restoran u Gradačcu!",
"Ambijent i hrana top nivo.",
"Uvijek se vraćamo ponovo.",
"Preporuka svima!"
];
let i=0;
setInterval(()=>{
 i=(i+1)%reviews.length;
 document.getElementById('reviews').innerText=reviews[i];
},3000);
</script>

</body>
</html>
