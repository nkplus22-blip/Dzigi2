<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restoran Džigi2 | Gradačac</title>

<meta name="description" content="Džigi2 – luksuzni restoran u Gradačcu. Rezervacije, navigacija i kontakt.">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c6a55c;
  --dark:#0f0a07;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
  font-family:'Poppins',sans-serif;
  background:#0f0a07;
  color:#fff;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  align-items:center;
  padding:15px 25px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(14px);
  z-index:100;
}
header img{height:50px;margin-right:10px;}
header h1{color:var(--gold);font-family:'Playfair Display',serif;}

.menu-toggle{
  margin-left:auto;
  display:flex;
  flex-direction:column;
  gap:6px;
  cursor:pointer;
}
.menu-toggle span{
  width:28px;height:3px;background:#fff;
}

/* NAV */
nav{
  position:fixed;
  right:-320px;
  top:0;
  width:320px;
  height:100vh;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transition:.4s;
}
nav.active{right:0;}
nav a{color:#fff;text-decoration:none;font-size:20px;margin:12px 0;}
.close-menu{
  position:absolute;
  top:15px;
  right:20px;
  font-size:34px;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  background:url('dzigi2.jpg') center/cover no-repeat;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding-top:80px;
}
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.7);
}

.hero-content{
  position:relative;
  z-index:2;
}

.hero h2{
  font-size:60px;
  color:var(--gold);
  font-family:'Playfair Display',serif;
}

.subtitle{margin-top:10px;font-size:20px;}
.status{margin-top:10px;}

/* CTA */
.cta-main{
  display:inline-block;
  margin-top:30px;
  padding:16px 40px;
  border:2px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
}
.cta-main:hover{
  background:var(--gold);
  color:#000;
}

.cta-secondary{
  display:inline-block;
  margin:10px;
  padding:10px 20px;
  border:1px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
}

/* SECTION */
section{padding:80px 20px;text-align:center;}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}
.gallery img{width:100%;border-radius:10px;}

/* REVIEWS */
.reviews{max-width:600px;margin:auto;font-style:italic;}

/* FORM */
.form input{
  display:block;
  margin:10px auto;
  padding:12px;
  width:80%;
}
.form button{
  margin-top:10px;
  padding:12px 30px;
  background:var(--gold);
  border:none;
  cursor:pointer;
}

/* MAP */
.map{height:400px;}

/* BOTTOM BAR */
.bottom-bar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

/* WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:70px;
  right:20px;
  background:#25D366;
  width:55px;height:55px;
  border-radius:50%;
  text-align:center;
  line-height:55px;
  color:#fff;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <img src="image121.png">
  <h1>Džigi2</h1>
  <div class="menu-toggle" id="menu-toggle">
    <span></span><span></span><span></span>
  </div>
</header>

<nav id="menu">
  <div class="close-menu" id="close-menu">&times;</div>
  <a href="index.html">Početna</a>
  <a href="menijela.html">Meni jela</a>
  <a href="#rez">Rezervacije</a>
  <a href="#rec">Utisci gostiju</a>
  <a href="galerija.html">Galerija</a>
</nav>

<section class="hero">
  <div class="hero-content">
    <h2>Džigi2</h2>
    <p class="subtitle">Luksuz & Tradicija</p>
    <div id="status" class="status"></div>

    <a href="#rez" class="cta-main">REZERVIŠI STO</a>

    <div>
      <a href="tel:+38735818817" class="cta-secondary">📞</a>
      <a href="https://wa.me/38761015241" class="cta-secondary">💬</a>
    </div>
  </div>
</section>

<section>
  <h2>Ambijent</h2>
  <div class="gallery">
    <img src="ambijent1.jpg">
    <img src="ambijent2.jpg">
    <img src="ambijent3.jpg">
    <img src="ambijent4.jpg">
  </div>
</section>

<section id="rec">
  <h2>Utisci gostiju</h2>
  <div class="reviews" id="reviews"></div>
</section>

<section id="rez">
  <h2>Rezervacija</h2>
  <div class="form">
    <input id="ime" placeholder="Ime">
    <input id="osobe" placeholder="Broj osoba">
    <input id="datum" placeholder="Datum">
    <button onclick="rezervisi()">Pošalji</button>
  </div>
</section>

<section>
  <h2>Lokacija</h2>
  <div class="map">
    <iframe src="https://www.google.com/maps?q=44.8818319,18.4202649&z=18&output=embed"
    width="100%" height="100%"></iframe>
  </div>
</section>

<footer style="text-align:center;padding:20px;background:#000;">
© 2026 Džigi2
</footer>

<a href="https://wa.me/38761015241" class="whatsapp">💬</a>

<div class="bottom-bar">
  <a href="tel:+38735818817">📞</a>
  <a href="https://wa.me/38761015241">💬</a>
  <a href="https://www.google.com/maps?q=44.8818319,18.4202649">📍</a>
</div>

<script>
// MENU
menu-toggle.onclick=()=>menu.classList.toggle('active');
close-menu.onclick=()=>menu.classList.remove('active');

// STATUS
const h=new Date().getHours();
status.innerText=(h>=8 && h<23)?"🟢 Otvoreni":"🔴 Zatvoreno";

// REVIEWS
const r=["Top restoran!","Hrana vrh!","Ambijent 10/10","Preporuka!"];
let i=0;
setInterval(()=>{reviews.innerText=r[i++%r.length]},3000);

// REZERVACIJA
function rezervisi(){
 let ime=document.getElementById("ime").value;
 let osobe=document.getElementById("osobe").value;
 let datum=document.getElementById("datum").value;

 let poruka=`Rezervacija - ${ime}, ${osobe} osoba, ${datum}`;
 window.open(`https://wa.me/38761015241?text=${encodeURIComponent(poruka)}`);
}
</script>

</body>
</html>
