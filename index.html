<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Restoran Džigi2 | Gradačac</title>

<meta name="description" content="Džigi2 – vrhunski restoran u Gradačcu. Rezerviši sto, nazovi ili pronađi put odmah.">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#c9a14a;
  --dark:#0f0a07;
  --glass:rgba(255,255,255,0.05);
}

*{margin:0;padding:0;box-sizing:border-box;}

html{scroll-behavior:smooth;}

body{
  font-family:'Poppins',sans-serif;
  background:radial-gradient(circle at top,#2b1b12,#0f0a07);
  color:#fff;
}

/* HEADER */
header{
  position:fixed;
  width:100%;
  display:flex;
  align-items:center;
  padding:15px 30px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(12px);
  z-index:100;
}
header img{height:60px;margin-right:10px;}
header h1{color:var(--gold);}

.menu-toggle{
  margin-left:auto;
  cursor:pointer;
}

/* HERO */
.hero{
  height:100vh;
  background:url('dzigi2.jpg') center/cover fixed;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.hero h2{
  font-size:60px;
  color:var(--gold);
}
.hero p{margin-top:20px;}

.cta{
  margin-top:30px;
  display:inline-block;
  padding:15px 35px;
  border:2px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
}
.cta:hover{background:var(--gold);color:#000;}

/* STATUS */
.status{
  margin-top:15px;
  font-weight:bold;
}

/* SECTION */
section{
  padding:100px 20px;
  text-align:center;
}

.glass{
  background:var(--glass);
  padding:40px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  max-width:1000px;
  margin:auto;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}
.gallery img{
  width:100%;
  border-radius:15px;
  transition:.4s;
}
.gallery img:hover{transform:scale(1.05);}

/* MAP */
.map{
  width:100%;
  height:400px;
}

/* BUTTONS */
.action-buttons{
  margin-top:20px;
}
.action-buttons a{
  display:inline-block;
  margin:10px;
  padding:12px 25px;
  border:1px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
}
.action-buttons a:hover{
  background:var(--gold);
  color:#000;
}

/* FLOATING WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:25px;
  right:25px;
  width:60px;
  height:60px;
  background:#25D366;
  border-radius:50%;
  text-align:center;
  line-height:60px;
  font-size:28px;
  color:#fff;
  text-decoration:none;
}

/* FLOAT ICONS */
.floating span{
  position:fixed;
  font-size:25px;
  opacity:.5;
  animation:float 12s linear infinite;
}
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-100vh);}
}
</style>
</head>

<body>

<!-- FLOAT ICONS -->
<div class="floating">
  <span style="left:10%">🍷</span>
  <span style="left:30%">🥩</span>
  <span style="left:70%">🍽️</span>
</div>

<header>
  <img src="image121.png">
  <h1>Džigi2</h1>
</header>

<section class="hero">
  <div>
    <h2>Džigi2</h2>
    <p>Luksuz & Tradicija</p>

    <div class="status" id="status"></div>

    <a href="#" class="cta">REZERVIŠI STO</a>

    <div class="action-buttons">
      <a href="tel:+38735818817">📞 Pozovi</a>
      <a href="https://wa.me/38761015241">💬 WhatsApp</a>
    </div>
  </div>
</section>

<section>
  <div class="glass">
    <h2>Ambijent</h2>
    <div class="gallery">
      <img src="ambijent1.jpg">
      <img src="ambijent2.jpg">
      <img src="ambijent3.jpg">
      <img src="ambijent4.jpg">
    </div>
  </div>
</section>

<section>
  <div class="glass">
    <h2>Lokacija</h2>
    <p>Ulica Varoška 2, Gradačac</p>

    <div class="map">
      <iframe
        src="https://www.google.com/maps?q=44.8818319,18.4202649&z=18&output=embed"
        width="100%" height="100%" style="border:0;">
      </iframe>
    </div>

    <div class="action-buttons">
      <a href="https://www.google.com/maps?q=44.8818319,18.4202649" target="_blank">
        📍 Navigacija
      </a>
    </div>

  </div>
</section>

<footer style="text-align:center;padding:20px;background:#000;">
© 2026 Džigi2
</footer>

<a href="https://wa.me/38761015241" class="whatsapp">💬</a>

<script>
const h=new Date().getHours();
document.getElementById('status').innerText=
(h>=8 && h<23)?"🟢 Otvoreni smo":"🔴 Zatvoreno";
</script>

</body>
</html>
