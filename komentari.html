<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Utisci gostiju - Džigi2</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(180deg,#f5f5f5,#eaeaea);
}
  body{
  overflow-x:hidden;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#000;
  color:#fff;
}

/* MENU */
nav{
  position:fixed;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:#0a0a0a;
  transform:translateX(100%);
  transition:0.4s ease;
  z-index:2000;
}
nav.active{
  transform:translateX(0);
}
  height:100%;
  background:#0a0a0a;
  transition:.4s;
  padding:20px;
}
nav.active{ right:0; }

nav a{
  display:block;
  color:#fff;
  margin:15px 0;
  text-decoration:none;
}

/* FORM */
form{
  margin:20px;
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

button{
  margin-top:15px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#d4af37,#f1d27a);
  font-weight:bold;
  cursor:pointer;
}

/* COMMENTS */
.comment{
  background:linear-gradient(145deg,#0a0a0a,#1a1a1a);
  color:#fff;
  margin:15px;
  padding:18px;
  border-radius:25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.comment small{
  color:#c9a96e;
}

.fake{
  opacity:0.6;
}

.delete-btn{
  margin-top:10px;
  background:#c0392b;
  border:none;
  color:#fff;
  padding:6px 12px;
  border-radius:10px;
}
  .fake{
  opacity:0.4;
  filter:grayscale(0.4);
}

.comment{
  transition:0.3s;
}

.comment:hover{
  transform:scale(1.02);
}
  body.menu-open::after{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<header>
<div>Džigi2</div>
<div onclick="toggleMenu()">☰</div>
</header>

<nav id="menu">
<div onclick="toggleMenu()">X</div>
<a href="index.html">Početna</a>
  <a href="menijela.html">Meni jela</a>
  <a href="rezervacije.html">Rezervacije</a>
  <a href="komentari.html">Utisci gostiju</a>
  <a href="galerija.html">Galerija</a>
</nav>

<!-- FORM NA VRHU -->
<form id="commentForm">
<input id="name" placeholder="Ime">
<input id="country" placeholder="Država">
<textarea id="comment" placeholder="Komentar"></textarea>
<button>Pošalji</button>
</form>

<div id="comments"></div>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGPmXTsw1k_g17mvV4vxsZXuZUTATun5Y",
  authDomain: "dzigi2.firebaseapp.com",
  projectId: "dzigi2",
  storageBucket: "dzigi2.firebasestorage.app",
  messagingSenderId: "787116518789",
  appId: "1:787116518789:web:4d1e8dd1bfb8115e7e28ec"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const commentsDiv = document.getElementById("comments");
  const nameInput = document.getElementById("name");
const countryInput = document.getElementById("country");
const commentInput = document.getElementById("comment");

// 🔥 FAKE KOMENTARI
const fake = [
"Odlična hrana!",
"Top restoran!",
"Preporuka svima!",
"Najbolje mjesto u gradu!"
];

fake.forEach(text=>{
  let div=document.createElement("div");
  div.className="comment";
  div.innerText=text;
  commentsDiv.appendChild(div);
});

// 🔥 REAL KOMENTARI
onSnapshot(collection(db,"test"), snap=>{

  // 🔥 očisti sve
  commentsDiv.innerHTML = "";

  // 🔥 prvo REAL (novi komentari gore)
  snap.forEach(docu=>{
    const c = docu.data();

    let div = document.createElement("div");
    div.className = "comment";

    div.innerHTML = `
      <div><b>${c.name}</b> • ${c.country}</div>
      <br><small>${c.text}</small>
      ${localStorage.getItem("admin")==="1" ? 
      `<button class="delete-btn" onclick="deleteComment('${docu.id}')">Obriši</button>` : ""}
    `;

    commentsDiv.appendChild(div);
  });

  // 🔥 onda FAKE (na dno, kao stariji)
  const fake = [
    {name:"Amir", text:"Odlična hrana!", flag:"🇧🇦"},
    {name:"Ivan", text:"Top restoran!", flag:"🇭🇷"},
    {name:"Marko", text:"Preporuka svima!", flag:"🇷🇸"}
  ];

  fake.forEach(f=>{
    let div = document.createElement("div");
    div.className = "comment fake";

    div.innerHTML = `
      ${f.flag} ${f.name}
      <br><small>${f.text}</small>
    `;

    commentsDiv.appendChild(div);
  });

});
// ADD
document.getElementById("commentForm").onsubmit=async e=>{
  e.preventDefault();

 await addDoc(collection(db,"test"),{
  name: nameInput.value,
  country: countryInput.value,
  text: commentInput.value
});

  e.target.reset();
};

// DELETE
window.deleteComment=async(id)=>{
  await deleteDoc(doc(db,"test",id));
};

// MENU
window.toggleMenu=()=>{
  document.getElementById("menu").classList.toggle("active");
};

</script>

</body>
</html>
