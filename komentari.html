<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Utisci gostiju - Džigi2</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Poppins;
  background:linear-gradient(180deg,#f8f8f8,#eeeeee);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#000;
  color:#fff;
}

/* MENU */
nav{
  position:fixed;
  right:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#111;
  transition:.3s;
  padding:20px;
}

nav.active{ right:0; }

nav a{
  display:block;
  color:#fff;
  margin:15px 0;
  text-decoration:none;
}

/* FORM */
form{
  background:#fff;
  margin:20px;
  padding:20px;
  border-radius:15px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
}

/* COMMENTS */
.comment{
  background:#000;
  color:#fff;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

.delete-btn{
  background:red;
  color:#fff;
  border:none;
  margin-top:10px;
  padding:5px 10px;
}
</style>
</head>

<body>

<header>
<div>Džigi2</div>
<div onclick="toggleMenu()">☰</div>
</header>

<nav id="menu">
<div onclick="toggleMenu()">X</div>
<a href="index.html">Početna</a>
  <a href="menijela.html">Meni jela</a>
  <a href="rezervacije.html">Rezervacije</a>
  <a href="komentari.html">Utisci gostiju</a>
  <a href="galerija.html">Galerija</a>
</nav>

<!-- FORM NA VRHU -->
<form id="commentForm">
<input id="name" placeholder="Ime">
<input id="country" placeholder="Država">
<textarea id="comment" placeholder="Komentar"></textarea>
<button>Pošalji</button>
</form>

<div id="comments"></div>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBGPmXTsw1k_g17mvV4vxsZXuZUTATun5Y",
  authDomain: "dzigi2.firebaseapp.com",
  projectId: "dzigi2",
  storageBucket: "dzigi2.firebasestorage.app",
  messagingSenderId: "787116518789",
  appId: "1:787116518789:web:4d1e8dd1bfb8115e7e28ec"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const commentsDiv = document.getElementById("comments");

// 🔥 FAKE KOMENTARI
const fake = [
"Odlična hrana!",
"Top restoran!",
"Preporuka svima!",
"Najbolje mjesto u gradu!"
];

fake.forEach(text=>{
  let div=document.createElement("div");
  div.className="comment";
  div.innerText=text;
  commentsDiv.appendChild(div);
});

// 🔥 REAL KOMENTARI
onSnapshot(collection(db,"comments"), snap=>{
  commentsDiv.innerHTML="";

  snap.forEach(docu=>{
    const c=docu.data();

    let div=document.createElement("div");
    div.className="comment";

    div.innerHTML=`
    ${c.country} ${c.name}<br>
    ${c.text}
    ${localStorage.getItem("admin")==="1" ? `<button class="delete-btn" onclick="deleteComment('${docu.id}')">Obriši</button>` : ""}
    `;

    commentsDiv.appendChild(div);
  });
});

// ADD
document.getElementById("commentForm").onsubmit=async e=>{
  e.preventDefault();

  await addDoc(collection(db,"comments"),{
    name: name.value,
    country: country.value,
    text: comment.value
  });

  e.target.reset();
};

// DELETE
window.deleteComment=async(id)=>{
  await deleteDoc(doc(db,"comments",id));
};

// MENU
window.toggleMenu=()=>{
  document.getElementById("menu").classList.toggle("active");
};

</script>

</body>
</html>
